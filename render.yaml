# Render Blueprint — backend API (all-in-one: HTTP + BullMQ worker + scheduler).
# New → Blueprint → point at this repo. Fill DATABASE_URL (Neon) and REDIS_URL
# (Upstash) when prompted; JWT_SECRET and SECRET_ENCRYPTION_KEY are generated.
#
# Frontend deploys separately on Vercel (see DEPLOY-PAAS.md).
services:
  - type: web
    name: oms-omni-api
    runtime: node
    rootDir: backend
    plan: free
    autoDeploy: true
    # Build installs devDeps too (ts-node is used to seed the demo tenant below).
    buildCommand: npm ci && npx prisma generate && npm run build
    # Apply migrations, seed the demo tenant/admin (idempotent), then run the app.
    startCommand: npx prisma migrate deploy && (npx ts-node prisma/seed.ts || true) && node dist/main.all.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: AUTH_REQUIRED
        value: "true"
      - key: PAYMENT_PROVIDER
        value: mock
      # Allow the browser SPA to call the API. Tighten to your Vercel URL later.
      - key: CORS_ORIGIN
        value: "*"
      # Neon Postgres connection string (include ?sslmode=require).
      - key: DATABASE_URL
        sync: false
      # Upstash Redis rediss:// URL (with password + TLS).
      - key: REDIS_URL
        sync: false
      # Generated by Render on first deploy.
      - key: JWT_SECRET
        generateValue: true
      - key: SECRET_ENCRYPTION_KEY
        generateValue: true
