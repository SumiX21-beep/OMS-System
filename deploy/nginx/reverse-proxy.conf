# Single public entrypoint for OMS-omni.
#   /api/*  → backend API (NestJS) on api:3000   (the /api prefix is stripped)
#   /*      → frontend SPA (nginx static) on frontend:80
#
# SSE (Server-Sent Events) endpoints need buffering off and long read timeouts,
# handled in the /api/ block below.

upstream oms_api {
  server api:3000;
}

upstream oms_frontend {
  server frontend:80;
}

server {
  listen 80;
  server_name _;

  # Shopify/marketplace webhooks can carry sizeable payloads.
  client_max_body_size 10m;

  # ── API ────────────────────────────────────────────────────────────────────
  location /api/ {
    proxy_pass http://oms_api/;            # trailing slash strips the /api prefix
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Server-Sent Events: stream immediately, never time out the long-lived feed.
    proxy_set_header Connection        '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    chunked_transfer_encoding off;
  }

  # ── Frontend SPA ─────────────────────────────────────────────────────────────
  location / {
    proxy_pass http://oms_frontend;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
