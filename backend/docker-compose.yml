version: "3.9"

# Convenience local infra for the OMS. Start with: docker compose up -d
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: oms_omni
    ports:
      - "5432:5432"
    volumes:
      - oms_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  oms_pg:
